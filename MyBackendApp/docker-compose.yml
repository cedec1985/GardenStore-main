version: "3.9"
services:
    backend:
        image: nginx:mainline-alpine3.23
        container_name: MyBackendApp
        build:
            context: ./MyBackendApp
        ports:
            - "8080:80"
    frontend:
        image: nginx:mainline-alpine3.23
        container_name: Frontend
        build:
            context: ./Frontend
        ports:
            - "4200:80"
        depends_on:
            - backend

